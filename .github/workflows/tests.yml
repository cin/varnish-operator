name: Tests

on: push

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Setup-go installation
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v1.x binaries are built with Go <1.26 and cannot lint go 1.26 modules
          version: v2.9.0
          args: --timeout=2m
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
      id: go
    - name: Setup envtest binaries
      run: |
        go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
        KUBEBUILDER_ASSETS="$(setup-envtest use 1.36.0 -p path)"
        echo "KUBEBUILDER_ASSETS=${KUBEBUILDER_ASSETS}" >> $GITHUB_ENV
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Get dependencies
      run: go mod download
    - name: Unit tests
      run: |
        go test github.com/cin/varnish-operator/pkg/... github.com/cin/varnish-operator/cmd/... github.com/cin/varnish-operator/api/... -coverprofile cover.out
