name: Containers

on:
  release:
    types:
      - created
  push:
    branches-ignore:
      - gh-pages

# Keep these pins in sync with the Makefile (VARNISH_VERSION_NUMBER,
# PROMETHEUS_VARNISH_EXPORTER_VERSION) so release images match dev/e2e builds.
env:
  VARNISH_VERSION_NUMBER: 9.0.3-1
  PROMETHEUS_VARNISH_EXPORTER_VERSION: v1.8.3

jobs:
  operator:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
      - name: Login to DockerHub
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          tags: ${{ github.event_name == 'release' && format('{0}/varnish-operator:{1}', secrets.DOCKERHUB_REPO, steps.get_version.outputs.VERSION) || format('varnish-operator:{0}', steps.get_version.outputs.VERSION) }}
          file: ./Dockerfile
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
          push: ${{ github.event_name == 'release' && github.event.action == 'created' }}
  varnishd:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
      - name: Login to DockerHub
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          tags: ${{ github.event_name == 'release' && format('{0}/varnish:{1}', secrets.DOCKERHUB_REPO, steps.get_version.outputs.VERSION) || format('varnish:{0}', steps.get_version.outputs.VERSION) }}
          file: ./Dockerfile.varnishd
          build-args: |
            VARNISH_VERSION_NUMBER=${{ env.VARNISH_VERSION_NUMBER }}
          push: ${{ github.event_name == 'release' && github.event.action == 'created' }}
  varnish-controller:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
      - name: Login to DockerHub
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          tags: ${{ github.event_name == 'release' && format('{0}/varnish-controller:{1}', secrets.DOCKERHUB_REPO, steps.get_version.outputs.VERSION) || format('varnish-controller:{0}', steps.get_version.outputs.VERSION) }}
          file: ./Dockerfile.controller
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
            VARNISH_VERSION_NUMBER=${{ env.VARNISH_VERSION_NUMBER }}
          push: ${{ github.event_name == 'release' && github.event.action == 'created' }}
  varnish-metrics-exporter:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
      - name: Login to DockerHub
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          tags: ${{ github.event_name == 'release' && format('{0}/varnish-metrics-exporter:{1}', secrets.DOCKERHUB_REPO, steps.get_version.outputs.VERSION) || format('varnish-metrics-exporter:{0}', steps.get_version.outputs.VERSION) }}
          file: ./Dockerfile.exporter
          build-args: |
            VARNISH_VERSION_NUMBER=${{ env.VARNISH_VERSION_NUMBER }}
            PROMETHEUS_VARNISH_EXPORTER_VERSION=${{ env.PROMETHEUS_VARNISH_EXPORTER_VERSION }}
          push: ${{ github.event_name == 'release' && github.event.action == 'created' }}
